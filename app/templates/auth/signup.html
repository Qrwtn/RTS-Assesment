{% extends "base.html" %}
{% block title %}Sign Up — StockApp{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="w-full max-w-md fade-in">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <div class="text-center mb-8">
        <i data-lucide="trending-up" class="w-10 h-10 text-blue-600 mx-auto mb-1"></i>
        <h1 class="text-2xl font-bold text-slate-900 mt-2">Create your account</h1>
        <p class="text-slate-500 text-sm mt-1">Start tracking stocks in seconds</p>
      </div>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-4">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/signup" class="space-y-4" id="signupForm" novalidate>
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}" />
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
          <input type="email" name="email" id="emailInput" required autofocus
                 value="{{ email or '' }}"
                 class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                 placeholder="you@example.com" />
          <p id="emailErr" class="text-xs text-red-500 mt-1 hidden">Please enter a valid email address.</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input type="password" name="password" id="passwordInput" required minlength="8"
                 class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                 placeholder="At least 8 characters" />
          <!-- Password strength bar -->
          <div class="mt-2 h-1 rounded-full bg-slate-100 overflow-hidden">
            <div id="strengthBar" class="h-full rounded-full transition-all duration-300 w-0"></div>
          </div>
          <p id="strengthLabel" class="text-xs text-slate-400 mt-1"></p>
        </div>
        <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 rounded-lg transition mt-2">
          Create Account
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Already have an account?
        <a href="/login" class="text-blue-600 hover:underline font-medium">Log in</a>
      </p>
    </div>
  </div>
</div>

<script>
// Client-side email format validation
const emailInput = document.getElementById('emailInput');
const emailErr = document.getElementById('emailErr');
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

emailInput.addEventListener('blur', () => {
  const valid = EMAIL_RE.test(emailInput.value.trim());
  emailErr.classList.toggle('hidden', valid || !emailInput.value);
  emailInput.classList.toggle('border-red-400', !valid && !!emailInput.value);
  emailInput.classList.toggle('border-slate-300', valid || !emailInput.value);
});

emailInput.addEventListener('input', () => {
  if (EMAIL_RE.test(emailInput.value.trim())) {
    emailErr.classList.add('hidden');
    emailInput.classList.remove('border-red-400');
    emailInput.classList.add('border-slate-300');
  }
});

// Password strength indicator
const pwInput = document.getElementById('passwordInput');
const bar = document.getElementById('strengthBar');
const label = document.getElementById('strengthLabel');

const LEVELS = [
  { min: 0,  w: '0%',   color: '',              text: '' },
  { min: 1,  w: '25%',  color: 'bg-red-400',    text: 'Weak' },
  { min: 8,  w: '50%',  color: 'bg-amber-400',  text: 'Fair' },
  { min: 12, w: '75%',  color: 'bg-yellow-400', text: 'Good' },
  { min: 16, w: '100%', color: 'bg-emerald-500', text: 'Strong' },
];

pwInput.addEventListener('input', () => {
  const v = pwInput.value;
  let score = v.length;
  if (/[A-Z]/.test(v)) score += 2;
  if (/[0-9]/.test(v)) score += 2;
  if (/[^A-Za-z0-9]/.test(v)) score += 4;

  const level = score === 0 ? LEVELS[0] : score < 8 ? LEVELS[1] : score < 14 ? LEVELS[2] : score < 20 ? LEVELS[3] : LEVELS[4];
  bar.className = `h-full rounded-full transition-all duration-300 ${level.color}`;
  bar.style.width = level.w;
  label.textContent = level.text;
  label.className = `text-xs mt-1 ${level.color.replace('bg-', 'text-')}`;
});

// Prevent double-submit & show loading
document.getElementById('signupForm').addEventListener('submit', function(e) {
  const valid = EMAIL_RE.test(emailInput.value.trim());
  if (!valid) {
    e.preventDefault();
    emailErr.classList.remove('hidden');
    emailInput.classList.add('border-red-400');
    emailInput.focus();
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Creating account…';
  btn.disabled = true;
  btn.classList.add('opacity-75');
});
</script>
{% endblock %}
