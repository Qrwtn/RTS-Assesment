{% extends "base.html" %}
{% block title %}Two-Factor Auth — StockApp{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="w-full max-w-sm fade-in">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center">
      <span class="text-4xl">🔐</span>
      <h1 class="text-xl font-bold text-slate-900 mt-3">Two-Factor Authentication</h1>
      <p class="text-slate-500 text-sm mt-2 mb-6">
        Enter the 6-digit code from your authenticator app.
      </p>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-4">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login/2fa" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}" />
        <input type="text" name="code" required autofocus
               maxlength="6" pattern="\d{6}"
               class="w-full text-center text-2xl tracking-[0.5em] font-mono border border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
               placeholder="000000" />
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 rounded-lg transition">
          Verify
        </button>
      </form>

      <a href="/login" class="text-sm text-slate-400 hover:text-slate-600 mt-4 inline-block">
        ← Back to login
      </a>
    </div>
  </div>
</div>
{% endblock %}
