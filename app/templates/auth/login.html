{% extends "base.html" %}
{% block title %}Log In — StockApp{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="w-full max-w-md fade-in">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <div class="text-center mb-8">
        <i data-lucide="trending-up" class="w-10 h-10 text-blue-600 mx-auto mb-1"></i>
        <h1 class="text-2xl font-bold text-slate-900 mt-2">Welcome back</h1>
        <p class="text-slate-500 text-sm mt-1">Log in to your StockApp account</p>
      </div>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-4">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}" />
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
          <input type="email" name="email" required autofocus
                 class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                 placeholder="you@example.com" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <div class="relative">
            <input type="password" name="password" id="loginPassword" required
                   class="w-full border border-slate-300 rounded-lg px-4 py-2.5 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                   placeholder="Your password" />
            <button type="button" id="toggleLoginPw" tabindex="-1"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition"
                    aria-label="Show password">
              <i data-lucide="eye" class="w-4 h-4" id="loginPwIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 rounded-lg transition mt-2">
          Log In
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Don't have an account?
        <a href="/signup" class="text-blue-600 hover:underline font-medium">Sign up free</a>
      </p>
    </div>
  </div>
</div>

<script>
const loginPwInput = document.getElementById('loginPassword');
const loginPwIcon  = document.getElementById('loginPwIcon');
document.getElementById('toggleLoginPw').addEventListener('click', () => {
  const show = loginPwInput.type === 'password';
  loginPwInput.type = show ? 'text' : 'password';
  loginPwIcon.setAttribute('data-lucide', show ? 'eye-off' : 'eye');
  lucide.createIcons({ nodes: [loginPwIcon.parentElement] });
});
</script>
{% endblock %}
